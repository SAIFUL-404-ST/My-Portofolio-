<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saif Elite Live TV</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0a0c;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    .tv-container {
      max-width: 700px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 900;
      color: #ffd700;
      letter-spacing: 1px;
    }
    .back-btn {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.2);
      padding: 8px 16px;
      border-radius: 12px;
      color: #ffd700;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.3s;
    }
    .back-btn:hover {
      background: rgba(255,215,0,0.2);
      border-color: #ffd700;
    }
    .player-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid rgba(255,215,0,0.2);
      background: #000;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .search-wrapper {
      position: relative;
      margin-bottom: 15px;
    }
    .search-wrapper i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,215,0,0.5);
    }
    .search-box {
      width: 100%;
      padding: 12px 16px 12px 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,215,0,0.15);
      background: #1a1a22;
      color: #fff;
      outline: none;
      font-size: 0.9rem;
    }
    .search-box:focus { border-color: #ffd700; }
    .category-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 15px;
    }
    .category-tabs::-webkit-scrollbar { height: 3px; }
    .category-tabs::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
    .tab-btn {
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,215,0,0.1);
      background: rgba(255,215,0,0.02);
      color: #ccc;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #ff4500, #ff8c00);
      color: #000;
      border-color: #ff8c00;
    }
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 5px;
    }
    .channel-grid::-webkit-scrollbar { width: 5px; }
    .channel-grid::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
    .channel-card {
      background: #121214;
      border: 1.5px solid rgba(255,215,0,0.1);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .channel-card:hover {
      border-color: #ffd700;
      background: rgba(255,215,0,0.05);
      transform: translateY(-2px);
    }
    .channel-card.active {
      border-color: #ff8c00;
      background: rgba(255,140,0,0.15);
    }
    .channel-logo {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      object-fit: contain;
      background: #1a1a22;
      padding: 5px;
    }
    .channel-name {
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.2;
      color: #fff;
      word-break: break-word;
    }
    .status {
      text-align: center;
      margin-top: 15px;
      opacity: 0.6;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="tv-container">
    <div class="header">
      <div class="logo">🏆 Saif Elite Live TV</div>
      <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
    </div>

    <div class="player-wrapper">
      <iframe id="playerFrame" sandbox="allow-scripts" allow="autoplay; fullscreen"></iframe>
    </div>

    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" class="search-box" placeholder="চ্যানেল খুঁজুন...">
    </div>

    <div class="category-tabs" id="categoryTabs">
      <button class="tab-btn active" data-cat="all">All</button>
    </div>

    <div class="channel-grid" id="channelGrid">
      <div style="grid-column:1/-1; text-align:center; padding:20px; opacity:0.7;">লোড হচ্ছে...</div>
    </div>
    <div class="status" id="statusText">Ready</div>
  </div>

  <script>
    const M3U_URL = "https://raw.githubusercontent.com/tabassumtanha127t-dot/Iptv/refs/heads/main/tv.m3u";
    let allChannels = [];
    let currentCategory = "all";

    // ========== স্যান্ডবক্স প্লেয়ার HTML জেনারেটর ==========
    function getPlayerHTML(streamUrl) {
      return `<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://vjs.zencdn.net/8.10.0/video-js.css">
  <style>
    body { margin:0; background:#000; display:flex; align-items:center; justify-content:center; height:100vh; }
    .video-js { width:100% !important; height:100% !important; }
    .video-js .vjs-big-play-button {
      background: linear-gradient(135deg, #ff4500, #ff8c00) !important;
      border: none !important; color: #000 !important; border-radius: 50% !important;
      width: 60px !important; height: 60px !important; line-height: 60px !important;
      margin-left: -30px !important; margin-top: -30px !important;
    }
  </style>
</head>
<body>
  <video id="player" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay></video>
  <script src="https://vjs.zencdn.net/8.10.0/video.js"><\\/script>
  <script>
    var player = videojs('player', { fluid: true, autoplay: true, controls: true });
    player.src({ src: '${streamUrl}', type: 'application/x-mpegURL', withCredentials: false });
    player.play();
  <\\/script>
</body>
</html>`;
    }

    function playChannel(url, name) {
      const iframe = document.getElementById('playerFrame');
      const blob = new Blob([getPlayerHTML(url)], { type: 'text/html' });
      iframe.src = URL.createObjectURL(blob);
      document.getElementById('statusText').innerHTML = `Playing: <span style="color:#ffd700;font-weight:bold;">${name}</span>`;
    }

    // ========== M3U পার্সিং ==========
    async function loadM3U() {
      try {
        const res = await fetch(M3U_URL);
        const text = await res.text();
        allChannels = parseM3U(text);
        populateCategories();
        filterAndRender();
      } catch (e) {
        document.getElementById('channelGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#ff3333;">চ্যানেল লোড করা যায়নি।</div>';
      }
    }

    function parseM3U(data) {
      const lines = data.split('\n');
      const result = [];
      let name = '';
      let logo = '';
      let group = '';
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
          // extract name and attributes
          const commaIdx = line.indexOf(',');
          if (commaIdx !== -1) {
            name = line.substring(commaIdx + 1).trim();
            const attrStr = line.substring(8, commaIdx);
            // get tvg-logo
            const logoMatch = attrStr.match(/tvg-logo="([^"]*)"/);
            logo = logoMatch ? logoMatch[1] : '';
            // get group-title
            const groupMatch = attrStr.match(/group-title="([^"]*)"/);
            group = groupMatch ? groupMatch[1] : '';
          }
        } else if (line.startsWith('http')) {
          if (name) {
            result.push({ name, url: line, logo, group });
            name = '';
            logo = '';
            group = '';
          }
        }
      }
      return result;
    }

    // ========== ক্যাটাগরি ট্যাব ==========
    function populateCategories() {
      // unique category from group (take main category before '|' or full group)
      const cats = [...new Set(allChannels.map(ch => {
        const parts = ch.group.split('|');
        return parts[0].trim() || 'Other';
      }))].sort();

      const tabs = document.getElementById('categoryTabs');
      tabs.innerHTML = '<button class="tab-btn active" data-cat="all">All</button>';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn';
        btn.setAttribute('data-cat', cat);
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentCategory = cat;
          filterAndRender();
        });
        tabs.appendChild(btn);
      });
      tabs.querySelector('[data-cat="all"]').addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        tabs.querySelector('[data-cat="all"]').classList.add('active');
        currentCategory = 'all';
        filterAndRender();
      });
    }

    function filterAndRender() {
      const term = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allChannels.filter(ch => {
        const matchSearch = ch.name.toLowerCase().includes(term);
        if (currentCategory === 'all') return matchSearch;
        const cat = ch.group.split('|')[0].trim() || 'Other';
        return cat === currentCategory && matchSearch;
      });
      renderGrid(filtered);
    }

    // ========== চ্যানেল গ্রিড ==========
    function renderGrid(channels) {
      const grid = document.getElementById('channelGrid');
      grid.innerHTML = '';
      if (!channels.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;opacity:0.6;padding:15px;">কোনো চ্যানেল পাওয়া যায়নি</div>';
        return;
      }
      channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
          <img class="channel-logo" src="${ch.logo || 'https://via.placeholder.com/60/1a1a22/ffd700?text=TV'}" 
               onerror="this.src='https://via.placeholder.com/60/1a1a22/ffd700?text=TV'">
          <div class="channel-name">${ch.name}</div>
        `;
        card.addEventListener('click', () => {
          document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          playChannel(ch.url, ch.name);
        });
        grid.appendChild(card);
      });
    }

    // ইভেন্ট লিসেনার
    document.getElementById('searchInput').addEventListener('input', filterAndRender);
    loadM3U();
  </script>
</body>
</html>
