<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saif Elite Live TV - Direct GitHub Raw</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://vjs.zencdn.net/8.10.0/video-js.css">

    <style>
        :root {
            --card-bg: #121214;
            --text: #ffffff;
            --gold: #ffd700;
            --fire1: #ff4500;
            --fire2: #ff8c00;
            --danger: #ff3333;
        }

        body {
            background-color: #0a0a0c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .tv-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 215, 0, 0.12);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            max-width: 500px;
            width: 100%;
            color: var(--text);
        }

        .tv-title {
            font-size: 0.9rem;
            color: var(--gold);
            margin: 0 0 16px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 1.5px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            margin-bottom: 20px;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9;
        }

        /* Custom Play Button Design */
        .video-js .vjs-big-play-button {
            background: linear-gradient(135deg, var(--fire1), var(--fire2)) !important;
            border: none !important;
            color: #000 !important;
            border-radius: 50% !important;
            width: 60px !important;
            height: 60px !important;
            line-height: 60px !important;
            margin-left: -30px !important;
            margin-top: -30px !important;
        }

        .channel-list-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 12px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Scrollbar styling */
        .channel-grid::-webkit-scrollbar {
            width: 5px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .channel-btn {
            padding: 12px 10px;
            border-radius: 12px;
            border: 1.5px solid rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.04);
            color: var(--text);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.3s ease;
        }

        .channel-btn:hover {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
            transform: translateY(-2px);
        }

        .channel-btn.active {
            background: linear-gradient(135deg, var(--fire1), var(--fire2));
            color: #000;
            border-color: var(--fire2);
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
        }

        .tv-status {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 15px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="tv-container">
        <div class="tv-title"><i class="fas fa-tv"></i> Saif Live tv</div>
        
        <div class="player-wrapper">
            <video id="saif-tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto">
                <p class="vjs-no-js">Please upgrade your browser to support HLS streams.</p>
            </video>
        </div>

        <div class="channel-list-title"><i class="fas fa-list-ul"></i> Select Channel:</div>
        <div class="channel-grid" id="tvChannelGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 20px; opacity: 0.7;">
                <i class="fas fa-spinner fa-spin"></i> Fetching channels directly from GitHub...
            </div>
        </div>
        
        <div class="tv-status" id="tvStatusText">Connected directly to GitHub Raw Repository</div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Initialize Player
            const player = videojs('saif-tv-player', {
                fluid: true,
                autoplay: false,
                controls: true
            });

            const gridContainer = document.getElementById('tvChannelGrid');
            const statusText = document.getElementById('tvStatusText');

            // আপনার দেওয়া সরাসরি গিটহাব র (GitHub Raw) লিংক
            const m3uUrl = 'https://raw.githubusercontent.com/tabassumtanha127t-dot/Iptv/refs/heads/main/tv.m3u';

            async function loadM3uDirect() {
                try {
                    const response = await fetch(m3uUrl);
                    if (!response.ok) throw new Error('Failed to fetch from GitHub Raw');
                    const text = await response.text();
                    
                    const channels = parseM3U(text);
                    if (channels.length === 0) {
                        gridContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--danger);">No channels could be parsed. Check m3u file format.</div>';
                        return;
                    }

                    renderChannels(channels, player);
                } catch (error) {
                    console.error('Error fetching M3U:', error);
                    gridContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--danger);"><i class="fas fa-exclamation-triangle"></i> Network Error. Make sure repo is Public.</div>';
                }
            }

            // M3U Standard Parser
            function parseM3U(data) {
                const lines = data.split('\n');
                const result = [];
                let currentChannelName = '';

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        const commaIndex = line.indexOf(',');
                        if (commaIndex !== -1) {
                            currentChannelName = line.substring(commaIndex + 1).trim();
                        } else {
                            currentChannelName = 'Live Stream';
                        }
                    } else if (line.startsWith('http://') || line.startsWith('https://')) {
                        if (currentChannelName) {
                            result.push({
                                name: currentChannelName,
                                url: line
                            });
                            currentChannelName = ''; // Reset pointer
                        }
                    }
                }
                return result;
            }

            // Create Buttons dynamically inside UI Grid
            function renderChannels(channels, videoPlayer) {
                gridContainer.innerHTML = ''; // Remove loader

                channels.forEach((channel, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'channel-btn';
                    btn.textContent = channel.name;
                    btn.title = channel.name;

                    btn.addEventListener('click', function () {
                        document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                        // Inject Stream URL safely to engine
                        videoPlayer.src({
                            src: channel.url,
                            type: 'application/x-mpegURL'
                        });
                        videoPlayer.play().catch(err => console.log("Autoplay block handled:", err));
                        
                        statusText.innerHTML = `Playing: <span style="color: var(--gold); font-weight:bold;">${channel.name}</span>`;
                    });

                    gridContainer.appendChild(btn);

                    // Auto select first entry on initial boot
                    if (index === 0) {
                        btn.classList.add('active');
                        videoPlayer.src({
                            src: channel.url,
                            type: 'application/x-mpegURL'
                        });
                        statusText.innerHTML = `Ready: <span style="color: var(--gold); font-weight:bold;">${channel.name}</span>`;
                    }
                });
            }

            loadM3uDirect();
        });
    </script>
</body>
</html>
